<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QRIS Payment - Fire Effect</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Orbitron', sans-serif;
      min-height: 100vh;
      background: url('https://media.giphy.com/media/l0HlBO7eyXzSZkJri/giphy.gif') no-repeat center center fixed;
      background-size: cover;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      background: rgba(0, 0, 0, 0.6);
      padding: 2rem;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(255, 100, 0, 0.6);
      max-width: 400px;
      width: 90%;
      animation: fadeInUp 1.5s ease-out;
    }

    .judul {
      font-size: 1.8rem;
      color: #ff6600;
      margin-bottom: 10px;
      text-shadow: 0 0 10px #ff3300;
      animation: flicker 2s infinite;
    }

    .scan-now {
      font-size: 1.4rem;
      margin-bottom: 15px;
      color: #fff;
      text-shadow: 0 0 10px #ff0000, 0 0 20px #ff6600, 0 0 30px #ff3300;
      animation: glowText 1.2s ease-in-out infinite alternate;
    }

    .qris-img {
      border: 4px solid #ff4400;
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 0 15px #ff5500, 0 0 30px #ff2200;
      animation: fireGlow 1.5s infinite ease-in-out alternate;
      max-width: 100%;
    }

    .footer {
      margin-top: 15px;
      color: #ccc;
      font-size: 0.9rem;
      animation: fadeIn 2.5s ease-in;
    }

    .btn-play {
      margin-top: 15px;
      background: #ff4400;
      border: none;
      padding: 10px 20px;
      font-size: 1rem;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 0 10px #ff6600, 0 0 20px #ff3300;
      transition: background 0.3s;
    }

    .btn-play:hover {
      background: #ff2200;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes glowText {
      from { text-shadow: 0 0 10px #ff0000; }
      to { text-shadow: 0 0 20px #ff6600, 0 0 30px #ff3300; }
    }

    @keyframes fireGlow {
      from { box-shadow: 0 0 10px #ff4400, 0 0 20px #ff2200; }
      to { box-shadow: 0 0 20px #ff6600, 0 0 40px #ff3300; }
    }

    @keyframes flicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
      20%, 24%, 55% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="judul">QRIS Payment</div>
    <div class="scan-now">SCAN NOW</div>
    <img class="qris-img" src="https://files.catbox.moe/pef2rg.jpg" alt="QRIS Payment" />
    <div class="footer">Terima kasih telah menggunakan layanan kami.</div>
    <button class="btn-play" onclick="playMusic()">▶️ Putar Musik</button>
  </div>

  <!-- Musik Latar -->
  <audio id="bg-music" loop>
    <source src="https://files.catbox.moe/hqhp0h.mp3" type="audio/mpeg" />
    Browser Anda tidak mendukung pemutar audio.
  </audio>

  <script>
    function playMusic() {
      const music = document.getElementById('bg-music');
      music.play();
      const button = document.querySelector('.btn-play');
      button.style.display = 'none'; // Sembunyikan setelah diputar
    }
  </script>
</body>
</html>
